<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Familie-VM-tipping for fotball-VM 2026.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VM Tipping 2026">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VM Tipping 2026</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Tilpassa oppstart: vi registrerer IKKJE service worker (appen treng nett
    uansett), og avregistrerer eventuelle gamle, slik at sida alltid hentar
    friskaste versjon ved vanleg refresh — utan å måtte tømme cache manuelt.
  -->
  <script>
    // Rydd vekk gammal service worker + cache frå tidlegare versjonar.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        for (var i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      });
    }
  </script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    // Ingen serviceWorkerSettings => Flutter registrerer ingen service worker.
    _flutter.loader.load();
  </script>
</body>
</html>
